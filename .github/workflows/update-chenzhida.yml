name: Build HTML Resume

on:
  push:
    paths:
      - 'chenzhida/resume.md'
      - 'chenzhida/template.html'
      - 'chenzhida/style.css'
  workflow_dispatch:  # 允许手动触发

jobs:
  build-html:
    runs-on: ubuntu-latest
    timeout-minutes: 5  # 设置超时时间
    permissions:
      contents: write  # 允许写入仓库内容

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}  # 使用 GitHub Token 进行认证

      - name: Setup Pandoc (仅安装pandoc，无需TeX)
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc
          echo "✅ Pandoc 已安装"

      - name: Generate HTML from template
        run: |
          cd chenzhida
          
          # 1. 读取模板
          if [ ! -f "template.html" ]; then
              echo "❌ 模板文件 template.html 不存在"
              exit 1
          fi
          
          TEMPLATE_CONTENT=$(cat template.html)
          
          # 2. 转换Markdown为HTML（不使用standalone，只获取HTML片段）
          if [ -f "resume.md" ]; then
              echo "正在转换 resume.md 为 HTML..."
              MARKDOWN_HTML=$(pandoc resume.md -f markdown -t html 2>/dev/null || echo "<p>Markdown转换失败，请检查格式</p>")
          else
              echo "❌ resume.md 文件不存在"
              MARKDOWN_HTML="<h2>简历文件未找到</h2><p>请创建 resume.md 文件</p>"
          fi

          # 3. 从resume.md提取个人信息（去除Markdown粗体标记）
          echo "正在解析resume.md提取个人信息..."
          NAME=$(grep -A 1 "## 基本信息" resume.md | grep "姓名:" | sed 's/.*姓名:[[:space:]]*//' | sed 's/\*\*//g' | xargs)
          TITLE=$(grep -A 1 "## 求职意向" resume.md | grep "职位:" | sed 's/.*职位:[[:space:]]*//' | sed 's/\*\*//g' | xargs)
          EMAIL=$(grep "邮箱:" resume.md | sed 's/.*邮箱:[[:space:]]*//' | sed 's/\*\*//g' | xargs)
          PHONE=$(grep "电话:" resume.md | sed 's/.*电话:[[:space:]]*//' | sed 's/\*\*//g' | xargs)
          AGE=$(grep "年龄:" resume.md | sed 's/.*年龄:[[:space:]]*//' | sed 's/\*\*//g' | xargs)
          GENDER=$(grep "性别:" resume.md | sed 's/.*性别:[[:space:]]*//' | sed 's/\*\*//g' | xargs)
          EXPERIENCE=$(grep "工作年限:" resume.md | sed 's/.*工作年限:[[:space:]]*//' | sed 's/\*\*//g' | xargs)

          # 设置默认值（如果提取失败）
          NAME=${NAME:-"陈志达"}
          TITLE=${TITLE:-"Java高级开发 | 架构师"}
          EMAIL=${EMAIL:-"chenzhida@apache.org"}
          PHONE=${PHONE:-"13257360626"}
          AGE=${AGE:-"32岁"}
          GENDER=${GENDER:-"男"}
          EXPERIENCE=${EXPERIENCE:-"10年经验"}

          echo "提取的信息: 姓名=$NAME, 职位=$TITLE, 邮箱=$EMAIL, 电话=$PHONE"

          # 4. 替换模板中的占位符
          echo "正在处理模板占位符..."
          FINAL_HTML="$TEMPLATE_CONTENT"

          # 依次替换所有占位符（使用bash字符串替换避免特殊字符问题）
          FINAL_HTML="${FINAL_HTML//\{\{NAME\}\}/$NAME}"
          FINAL_HTML="${FINAL_HTML//\{\{TITLE\}\}/$TITLE}"
          FINAL_HTML="${FINAL_HTML//\{\{EMAIL\}\}/$EMAIL}"
          FINAL_HTML="${FINAL_HTML//\{\{GITHUB\}\}/github.com/sweetwuxiaomei}"
          FINAL_HTML="${FINAL_HTML//\{\{GITHUB_USER\}\}/sweetwuxiaomei}"
          FINAL_HTML="${FINAL_HTML//\{\{LOCATION\}\}/中国}"
          FINAL_HTML="${FINAL_HTML//\{\{PHONE\}\}/$PHONE}"
          FINAL_HTML="${FINAL_HTML//\{\{AGE\}\}/$AGE}"
          FINAL_HTML="${FINAL_HTML//\{\{GENDER\}\}/$GENDER}"
          FINAL_HTML="${FINAL_HTML//\{\{EXPERIENCE\}\}/$EXPERIENCE}"
          UPDATE_TIME=$(date '+%Y年%m月%d日 %H:%M:%S')
          FINAL_HTML="${FINAL_HTML//\{\{UPDATE_TIME\}\}/$UPDATE_TIME}"

          # 4. 替换内容区域（使用awk处理）
          echo "正在注入简历内容..."
          echo "$MARKDOWN_HTML" > /tmp/resume_content.html
          FINAL_HTML=$(awk 'NR==FNR{content=content $0; next} {gsub(/___RESUME_CONTENT___/, content); print} ENDRESUME' /tmp/resume_content.html - <<< "$FINAL_HTML")

          # 5. 写入最终的index.html
          echo "$FINAL_HTML" > index.html
          
          # 6. 验证生成的文件
          if [ -s "index.html" ]; then
              echo "✅ HTML简历已成功生成"
              echo "文件大小: $(wc -c < index.html) 字节"
          else
              echo "❌ index.html 文件为空或生成失败"
              exit 1
          fi

      - name: Validate and preview
        run: |
          cd chenzhida
          echo "=== 生成的文件预览（前10行）==="
          head -20 index.html
          echo "================================"
          
          # 检查是否包含必要的内容
          if grep -q "陈志达" index.html; then
              echo "✅ 简历内容检测成功"
          else
              echo "⚠️  可能未正确替换占位符"
          fi

      - name: Copy files to root for GitHub Pages
        run: |
          # 复制生成的文件到根目录，方便 GitHub Pages 访问
          cp chenzhida/index.html index.html
          cp chenzhida/style.css style.css
          echo "✅ 文件已复制到根目录"

      - name: Commit generated HTML
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # 添加并提交index.html和style.css
          git add chenzhida/index.html
          git add index.html
          git add style.css

          # 检查是否有待提交的变更
          if git diff --cached --quiet; then
              echo "⚠️ 没有文件变化，跳过提交"
          else
              git commit -m "自动化更新HTML简历 [$(date +'%Y-%m-%d %H:%M:%S')]"
              git push
              echo "✅ 已提交更新的HTML简历"
          fi

      - name: Create build summary
        if: success()
        run: |
          echo "## 🎉 HTML简历构建成功" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**生成的文件**:" >> $GITHUB_STEP_SUMMARY
          echo "- [index.html](https://github.com/${{ github.repository }}/blob/master/index.html) (根目录)" >> $GITHUB_STEP_SUMMARY
          echo "- [chenzhida/index.html](https://github.com/${{ github.repository }}/blob/master/chenzhida/index.html) (源目录)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**查看简历**: " >> $GITHUB_STEP_SUMMARY
          echo "- GitHub Pages: \`https://sweetwuxiaomei.github.io/resume/\`" >> $GITHUB_STEP_SUMMARY
          echo "- GitHub 在线预览: \`https://github.com/${{ github.repository }}/blob/master/index.html\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**提示**: 请在仓库 Settings -> Pages 中启用 GitHub Pages，选择 'Deploy from a branch' -> 'master' -> '/' 目录。" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "下次更新只需编辑 \`chenzhida/resume.md\` 文件即可。" >> $GITHUB_STEP_SUMMARY
name: Build ChenZhida's Resume

on:
  push:
    paths:
      - 'chenzhida/resume.md'
      - 'chenzhida/template.html'
      - 'chenzhida/style.css'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

#      - name: Setup Pandoc and dependencies
#        run: |
#          sudo apt-get update
#          sudo apt-get install -y \
#            pandoc \
#            texlive-xetex \
#            texlive-fonts-recommended \
#            texlive-lang-chinese

      - name: Generate HTML from template
        run: |
          cd chenzhida
          
          # 读取模板
          TEMPLATE_CONTENT=$(cat template.html)
          
          # 转换Markdown为HTML
          if [ -f "resume.md" ]; then
              MARKDOWN_HTML=$(pandoc resume.md -f markdown -t html --standalone)
          else
              MARKDOWN_HTML="<h2>简历文件未找到</h2><p>请创建 resume.md 文件</p>"
          fi
          
          # 替换模板中的占位符
          FINAL_HTML=$(echo "$TEMPLATE_CONTENT" | \
            sed "s|{{NAME}}|陈志达|g" | \
            sed "s|{{TITLE}}|全栈开发者 \| 技术热爱者 \| 问题解决者|g" | \
            sed "s|{{EMAIL}}|sweetwuxiaomei@example.com|g" | \
            sed "s|{{GITHUB}}|github.com/SweetWuXiaoMei|g" | \
            sed "s|{{GITHUB_USER}}|SweetWuXiaoMei|g" | \
            sed "s|{{LOCATION}}|上海|g" | \
            sed "s|{{PHONE}}|(+86) 138-XXXX-XXXX|g" | \
            sed "s|{{UPDATE_TIME}}|$(date '+%Y年%m月%d日 %H:%M:%S')|g")
          
          # 替换内容区域
          FINAL_HTML=$(echo "$FINAL_HTML" | \
            sed "s|<!-- {{RESUME_CONTENT}} -->|$MARKDOWN_HTML|")
          
          # 写入最终的index.html
          echo "$FINAL_HTML" > index.html
          
          echo "✅ HTML简历已生成"

#      - name: Generate PDF resume
#        run: |
#          cd chenzhida
#
#          if [ -f "resume.md" ]; then
#              pandoc resume.md \
#                -f markdown \
#                -t pdf \
#                -o resume.pdf \
#                --pdf-engine=xelatex \
#                -V mainfont="Source Han Serif SC" \
#                -V sansfont="Source Han Sans SC" \
#                -V geometry:margin=1in \
#                -V colorlinks=true \
#                -V linkcolor=blue
#
#              echo "✅ PDF简历已生成"
#          else
#              echo "⚠️ resume.md 文件不存在，跳过PDF生成"
#          fi

      - name: Commit and push generated files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 检查文件是否有变化
          if git diff --quiet HEAD -- chenzhida/index.html chenzhida/resume.pdf 2>/dev/null; then
              echo "⚠️ 没有文件变化，跳过提交"
          else
              git add chenzhida/index.html chenzhida/resume.pdf
              git commit -m "自动化构建简历 [$(date +'%Y-%m-%d %H:%M:%S')]"
              git push
              echo "✅ 已提交生成的文件"
          fi
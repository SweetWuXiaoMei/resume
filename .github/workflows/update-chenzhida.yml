name: Build HTML Resume

on:
  push:
    paths:
      - 'chenzhida/resume.md'
      - 'chenzhida/template.html'
      - 'chenzhida/style.css'
  workflow_dispatch:  # 允许手动触发

jobs:
  build-html:
    runs-on: ubuntu-latest
    timeout-minutes: 5  # 设置超时时间
    permissions:
      contents: write  # 允许写入仓库内容

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}  # 使用 GitHub Token 进行认证

      - name: Setup Pandoc (仅安装pandoc，无需TeX)
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc
          echo "✅ Pandoc 已安装"

      - name: Generate HTML from template
        run: |
          cd chenzhida
          
          # 1. 读取模板
          if [ ! -f "template.html" ]; then
              echo "❌ 模板文件 template.html 不存在"
              exit 1
          fi
          
          TEMPLATE_CONTENT=$(cat template.html)
          
          # 2. 转换Markdown为HTML
          if [ -f "resume.md" ]; then
              echo "正在转换 resume.md 为 HTML..."
              MARKDOWN_HTML=$(pandoc resume.md -f markdown -t html --standalone 2>/dev/null || echo "<p>Markdown转换失败，请检查格式</p>")
          else
              echo "❌ resume.md 文件不存在"
              MARKDOWN_HTML="<h2>简历文件未找到</h2><p>请创建 resume.md 文件</p>"
          fi
          
          # 3. 替换模板中的占位符
          echo "正在处理模板占位符..."
          FINAL_HTML="$TEMPLATE_CONTENT"

          # 从resume.md提取信息或使用默认值
          NAME="陈志达"
          TITLE="Java高级开发 | 架构师 | Apache ServiceComb PMC"
          EMAIL="chenzhida@apache.org"
          PHONE="13257360626"
          LOCATION="中国"
          GITHUB="github.com/SweetWuXiaoMei"
          GITHUB_USER="${{ github.repository_owner }}"

          # 依次替换所有占位符（使用bash字符串替换避免特殊字符问题）
          FINAL_HTML="${FINAL_HTML//\{\{NAME\}\}/$NAME}"
          FINAL_HTML="${FINAL_HTML//\{\{TITLE\}\}/$TITLE}"
          FINAL_HTML="${FINAL_HTML//\{\{EMAIL\}\}/$EMAIL}"
          FINAL_HTML="${FINAL_HTML//\{\{GITHUB\}\}/$GITHUB}"
          FINAL_HTML="${FINAL_HTML//\{\{GITHUB_USER\}\}/$GITHUB_USER}"
          FINAL_HTML="${FINAL_HTML//\{\{LOCATION\}\}/$LOCATION}"
          FINAL_HTML="${FINAL_HTML//\{\{PHONE\}\}/$PHONE}"
          UPDATE_TIME=$(date '+%Y年%m月%d日 %H:%M:%S')
          FINAL_HTML="${FINAL_HTML//\{\{UPDATE_TIME\}\}/$UPDATE_TIME}"

          # 4. 替换内容区域（使用临时文件和字符串替换）
          if echo "$FINAL_HTML" | grep -q "{{RESUME_CONTENT}}"; then
              # 使用shell的字符串替换
              FINAL_HTML="${FINAL_HTML//\{\{RESUME_CONTENT\}\}/$MARKDOWN_HTML}"
          elif echo "$FINAL_HTML" | grep -q "<!-- {{RESUME_CONTENT}} -->"; then
              FINAL_HTML="${FINAL_HTML//<!-- {{RESUME_CONTENT}} -->/$MARKDOWN_HTML}"
          else
              # 如果没有找到占位符，在markdown-body div中插入内容
              FINAL_HTML="${FINAL_HTML//<div class=\"markdown-body\" id=\"resume-content\">/<div class=\"markdown-body\" id=\"resume-content\">$MARKDOWN_HTML}"
          fi

          # 5. 写入最终的index.html
          printf '%s\n' "$FINAL_HTML" > index.html
          
          # 6. 验证生成的文件
          if [ -s "index.html" ]; then
              echo "✅ HTML简历已成功生成"
              echo "文件大小: $(wc -c < index.html) 字节"
          else
              echo "❌ index.html 文件为空或生成失败"
              exit 1
          fi

      - name: Validate and preview
        run: |
          cd chenzhida
          echo "=== 生成的文件预览（前10行）==="
          head -20 index.html
          echo "================================"
          
          # 检查是否包含必要的内容
          if grep -q "陈志达" index.html; then
              echo "✅ 简历内容检测成功"
          else
              echo "⚠️  可能未正确替换占位符"
          fi

      - name: Copy files to root for GitHub Pages
        run: |
          # 复制生成的文件到根目录，方便 GitHub Pages 访问
          cp chenzhida/index.html index.html
          cp chenzhida/style.css style.css
          echo "✅ 文件已复制到根目录"

      - name: Commit generated HTML
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # 添加并提交index.html和style.css
          git add chenzhida/index.html
          git add index.html
          git add style.css

          # 检查是否有待提交的变更
          if git diff --cached --quiet; then
              echo "⚠️ 没有文件变化，跳过提交"
          else
              git commit -m "自动化更新HTML简历 [$(date +'%Y-%m-%d %H:%M:%S')]"
              git push
              echo "✅ 已提交更新的HTML简历"
          fi

      - name: Create build summary
        if: success()
        run: |
          echo "## 🎉 HTML简历构建成功" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**生成的文件**:" >> $GITHUB_STEP_SUMMARY
          echo "- [index.html](https://github.com/${{ github.repository }}/blob/master/index.html) (根目录)" >> $GITHUB_STEP_SUMMARY
          echo "- [chenzhida/index.html](https://github.com/${{ github.repository }}/blob/master/chenzhida/index.html) (源目录)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**查看简历**: " >> $GITHUB_STEP_SUMMARY
          echo "- GitHub Pages: \`https://${{ github.repository_owner }}.github.io/${{ github.repository }}/\`" >> $GITHUB_STEP_SUMMARY
          echo "- GitHub 在线预览: \`https://github.com/${{ github.repository }}/blob/master/index.html\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**提示**: 请在仓库 Settings -> Pages 中启用 GitHub Pages，选择 'Deploy from a branch' -> 'master' -> '/' 目录。" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "下次更新只需编辑 \`chenzhida/resume.md\` 文件即可。" >> $GITHUB_STEP_SUMMARY
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{NAME}} - 个人简历</title>
    <meta name="description" content="{{NAME}}的个人技术简历 - {{TITLE}}">
    <meta name="keywords" content="{{NAME}},简历,Java,架构师,全栈开发">
    <meta name="author" content="{{NAME}}">

    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📄</text></svg>">
</head>
<body>
    <div class="page-container">
        <!-- 顶部导航 -->
        <nav class="top-nav">
            <span class="logo">📄</span>
            <button class="print-btn" onclick="window.print()">打印简历</button>
        </nav>

        <!-- 头部信息 -->
        <header class="header">
            <h1 class="name">{{NAME}}</h1>
            <p class="subtitle">{{TITLE}}</p>
            <div class="contact-bar">
                <span class="contact-item"><span class="icon">📧</span>{{EMAIL}}</span>
                <span class="contact-item"><span class="icon">📱</span>{{PHONE}}</span>
                <span class="contact-item"><span class="icon">🔗</span><a href="https://{{GITHUB}}" target="_blank">{{GITHUB}}</a></span>
            </div>
        </header>

        <!-- 主要内容 -->
        <main class="main-content">
            <!-- CONTENT_PLACEHOLDER -->

            <!-- 下载按钮 -->
            <div class="download-section">
                <a href="resume.md" download="resume.md" class="download-link">
                    <span class="download-icon">⬇️</span>
                    下载 Markdown 源文件
                </a>
            </div>
        </main>

        <!-- 页脚 -->
        <footer class="footer">
            <p>最后更新：<span class="update-time">{{UPDATE_TIME}}</span></p>
            <p class="footer-links">
                <a href="https://github.com/{{GITHUB_USER}}/resume/actions" target="_blank">构建日志</a> |
                <a href="https://github.com/{{GITHUB_USER}}/resume" target="_blank">项目仓库</a>
            </p>
        </footer>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{NAME}} - 个人简历</title>
    <meta name="description" content="{{NAME}}的个人技术简历 - {{TITLE}}">
    <meta name="keywords" content="{{NAME}},简历,Java,架构师,全栈开发">
    <meta name="author" content="{{NAME}}">

    <!-- 样式表 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.0/github-markdown.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📄</text></svg>">
</head>
<body>
<div class="container">
    <!-- 顶部导航栏（右侧下载按钮） -->
    <div class="top-nav">
        <div class="logo">📄 简历</div>
        <a href="resume.md" download="resume.md" class="download-btn" title="下载Markdown原文件">
            <span class="download-icon">⬇️</span>
            <span class="download-text">下载源文件</span>
        </a>
    </div>

    <!-- 头部信息 -->
    <div class="header">
        <h1>{{NAME}}</h1>
        <p class="title">{{TITLE}}</p>

        <div class="contact-info">
            <div class="contact-item">
                <span class="icon">📧</span>
                <span class="value">{{EMAIL}}</span>
            </div>
            <div class="contact-item">
                <span class="icon">📱</span>
                <span class="value">{{PHONE}}</span>
            </div>
            <div class="contact-item">
                <span class="icon">🔗</span>
                <a href="https://{{GITHUB}}" target="_blank" class="value">GitHub主页</a>
            </div>
            <div class="contact-item">
                <span class="icon">📍</span>
                <span class="value">{{LOCATION}}</span>
            </div>
            <div class="contact-item">
                <span class="icon">🎂</span>
                <span class="value">{{AGE}}</span>
            </div>
            <div class="contact-item">
                <span class="icon">💼</span>
                <span class="value">{{EXPERIENCE}}</span>
            </div>
        </div>
    </div>

    <!-- 操作按钮 -->
    <div class="actions">
        <a href="resume.md" class="btn btn-primary" target="_blank">
            📝 查看Markdown源码
        </a>
        <a href="https://github.com/{{GITHUB_USER}}" class="btn btn-secondary" target="_blank">
            🐱 GitHub主页
        </a>
        <button class="btn btn-secondary" onclick="window.print()">
            🖨️ 打印简历
        </button>
    </div>

    <!-- Markdown内容区域 -->
    <div class="markdown-body" id="resume-content">
        ___RESUME_CONTENT___
    </div>

    <!-- 页脚信息 -->
    <div class="last-update">
        <p>
            最后更新: <span id="update-time">{{UPDATE_TIME}}</span> |
            自动生成自 <a href="resume.md">resume.md</a>
        </p>
        <p>
            <a href="https://github.com/{{GITHUB_USER}}/resume/actions" target="_blank">查看构建日志</a> |
            <a href="https://github.com/{{GITHUB_USER}}/resume" target="_blank">项目仓库</a>
        </p>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // 更新显示时间
        const updateTime = document.getElementById('update-time');
        if (updateTime && updateTime.textContent.includes('{{UPDATE_TIME}}')) {
            const now = new Date();
            const timeString = now.toLocaleDateString('zh-CN', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            });
            updateTime.textContent = timeString;
        }

        // 为所有外部链接添加target="_blank"
        document.querySelectorAll('a[href^="http"]').forEach(link => {
            if (link.hostname !== window.location.hostname) {
                link.target = '_blank';
                link.rel = 'noopener noreferrer';
            }
        });

        // 平滑滚动
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const targetId = this.getAttribute('href');
                if (targetId !== '#') {
                    const targetElement = document.querySelector(targetId);
                    if (targetElement) {
                        targetElement.scrollIntoView({ behavior: 'smooth' });
                    }
                }
            });
        });
    });
</script>
</body>
</html>

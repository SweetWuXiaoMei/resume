name: Update ChenZhida's Resume

on:
  push:
    paths:
      - 'chenzhida/resume.md'  # 只监控你的简历文件
  workflow_dispatch:  # 允许手动运行

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 生成美观的 README
        run: |
          # 进入你的目录
          cd chenzhida
          
          # 创建带样式的 README.md
          cat > README.md << 'EOF'
          # 🧑‍💻 陈志达的在线简历
          
          > **持续更新的技术简历 | [📄 编辑此简历](resume.md)**
          
          ![](https://visitor-badge.laobi.icu/badge?page_id=SweetWuXiaoMei.resume.chenzhida) 
          [![最后更新](https://img.shields.io/github/last-commit/SweetWuXiaoMei/resume/main)](https://github.com/SweetWuXiaoMei/resume)
          [![GitHub](https://img.shields.io/badge/GitHub-SweetWuXiaoMei-blue)](https://github.com/SweetWuXiaoMei)
          
          ---
          
          EOF
          
          # 添加简历内容
          cat resume.md >> README.md
          
          # 添加页脚
          cat >> README.md << 'EOF'
          
          ---
          
          ## 📬 如何联系我
          
          欢迎通过以下方式联系我：
          - 📧 邮箱：chenzhida@apache.org
          
          *这份简历由 [Markdown](resume.md) 驱动，通过 GitHub Actions 自动构建。*
          *最后构建时间：$(date -u '+%Y年%m月%d日 %H:%M:%S') UTC*
          EOF

      - name: 提交更改
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs(chenzhida): 自动更新简历 [skip ci]"
          file_pattern: |
            chenzhida/README.md